apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-counter-app
  namespace: simple-counter
spec:
  selector:
    matchLabels:
      app: simple-counter-app
  template:
    metadata:
      labels:
        app: simple-counter-app
    spec:
      securityContext:
        runAsUser: 65532
        runAsGroup: 65532
        runAsNonRoot: true
        fsGroup: 65532
      containers:
        - name: simple-counter-app
          image: claw4321/simple-counter:v1
          securityContext:
            runAsUser: 65532
            runAsGroup: 65532
            runAsNonRoot: true
            fsGroup: 65532
          resources:
            limits:
              memory: "128Mi"
              cpu: "500m"
            requests:
              memory: "64Mi"
              cpu: "250m"
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: redis-config
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: simple-counter-app
  namespace: simple-counter
spec:
  selector:
    app: simple-counter-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: NodePort
