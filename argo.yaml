apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: simple-counter
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/AmulThantharate/simple-counter.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: simple-counter 
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true