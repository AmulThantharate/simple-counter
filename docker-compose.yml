services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simple-counter-app
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DATABASE: 0
      REDIS_TLS: "false"
      COUNTER_REDIS_KEY: counter-app:state:v1
  redis:
    image: redis:7.2-alpine
    container_name: simple-counter-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
